# Configuration Nginx pour servir les fichiers statiques et media
# à utiliser avec Dokploy sur Hostinger

# Rediriger vers HTTPS (si pas déjà fait par le proxy)
server {
    listen 80;
    server_name venus-luna.com www.venus-luna.com;
    
    # Fichiers statiques (WhiteNoise)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Fichiers media (images uploadées)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        
        # Essayer de servir le fichier, sinon retourner 404
        try_files $uri =404;
    }
    
    # Fichiers avatars utilisateurs
    location /media/avatars/ {
        alias /app/media/avatars/;
        expires 30d;
        add_header Cache-Control "public";
    }
    
    # Fichiers blog
    location /media/blog/ {
        alias /app/media/blog/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Fichiers produits
    location /media/products/ {
        alias /app/media/products/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Fichiers core (bannières, logos)
    location /media/core/ {
        alias /app/media/core/;
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # Proxy vers Gunicorn pour les requêtes Django
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

